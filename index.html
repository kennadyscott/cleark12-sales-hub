<meta charset="utf-8" />
<title>ClearK12 Sales Hub</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<style>
  /* ---------- Tokens ---------- */
  :root {
    --bg: #F3F4F2;
    --surface: #FFFFFF;
    --surface-2: #EDEFEA;
    --border: #E2E5DF;
    --border-strong: #D0D4CC;
    --ink: #16191E;
    --ink-2: #3D434C;
    --muted: #5D6570;
    --faint: #8B929C;
    --shadow: 0 1px 2px rgba(22,25,30,.04), 0 8px 24px rgba(22,25,30,.05);
    --shadow-lg: 0 12px 40px rgba(22,25,30,.13);
    --radius: 16px;
    --radius-sm: 10px;
    --maxw: 1120px;
    --good: #12805a;
    --bad: #bb4430;

    /* default context = clark12 */
    --accent: #1F9BE0;
    --accent-strong: #10305C;
    --on-accent: #ffffff;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #101318; --surface: #181C23; --surface-2: #1F242D; --border: #29303A;
      --border-strong: #38404C; --ink: #E9ECEF; --ink-2: #C6CCD4; --muted: #949CA8; --faint: #6D7683;
      --shadow: 0 1px 2px rgba(0,0,0,.3), 0 10px 28px rgba(0,0,0,.35);
      --shadow-lg: 0 16px 48px rgba(0,0,0,.5);
      --good: #46c18d; --bad: #ef7a64;
    }
  }
  :root[data-theme="light"] {
    --bg:#F3F4F2; --surface:#FFFFFF; --surface-2:#EDEFEA; --border:#E2E5DF;
    --border-strong:#D0D4CC; --ink:#16191E; --ink-2:#3D434C; --muted:#5D6570; --faint:#8B929C;
    --shadow: 0 1px 2px rgba(22,25,30,.04), 0 8px 24px rgba(22,25,30,.05);
    --shadow-lg: 0 12px 40px rgba(22,25,30,.13);
    --good:#12805a; --bad:#bb4430;
  }
  :root[data-theme="dark"] {
    --bg:#101318; --surface:#181C23; --surface-2:#1F242D; --border:#29303A;
    --border-strong:#38404C; --ink:#E9ECEF; --ink-2:#C6CCD4; --muted:#949CA8; --faint:#6D7683;
    --shadow: 0 1px 2px rgba(0,0,0,.3), 0 10px 28px rgba(0,0,0,.35);
    --shadow-lg: 0 16px 48px rgba(0,0,0,.5);
    --good:#46c18d; --bad:#ef7a64;
  }

  /* Contextual accent per section */
  :root[data-product="clark12"]  { --accent:#1F9BE0; --accent-strong:#10305C; --on-accent:#fff; }
  :root[data-product="crystal"]  { --accent:#D81BB8; --accent-strong:#8E7CE8; --on-accent:#fff; }
  :root[data-product="lonestar"] { --accent:#2FB4CC; --accent-strong:#0C3A4B; --on-accent:#062730; }
  :root[data-theme="dark"][data-product="clark12"]  { --accent-strong:#5CB6EA; }
  :root[data-theme="dark"][data-product="lonestar"] { --accent-strong:#7FD6E6; }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"])[data-product="clark12"]  { --accent-strong:#5CB6EA; }
    :root:not([data-theme="light"])[data-product="lonestar"] { --accent-strong:#7FD6E6; }
  }

  * { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }
  body {
    margin: 0;
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: var(--bg); color: var(--ink);
    font-size: 15px; line-height: 1.6; -webkit-font-smoothing: antialiased;
  }
  h1,h2,h3,h4 { margin: 0; line-height: 1.12; text-wrap: balance; letter-spacing: -.02em; font-weight: 700; }
  p { margin: 0; }
  a { color: inherit; }
  button { font: inherit; cursor: pointer; }
  ::selection { background: color-mix(in srgb, var(--accent) 28%, transparent); }

  .eyebrow { font-size: 11.5px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: var(--accent-strong); }
  .num { font-variant-numeric: tabular-nums; }

  /* ---------- Top nav ---------- */
  .topnav {
    position: sticky; top: 0; z-index: 40;
    background: color-mix(in srgb, var(--surface) 90%, transparent);
    backdrop-filter: saturate(1.4) blur(10px);
    border-bottom: 1px solid var(--border);
  }
  .topnav-in {
    max-width: var(--maxw); margin: 0 auto; padding: 0 24px;
    display: flex; align-items: center; gap: 28px; height: 64px;
  }
  .brand { display: flex; align-items: center; gap: 10px; text-decoration: none; flex-shrink: 0; }
  .brand-name { font-weight: 800; letter-spacing: -.03em; font-size: 17px; white-space: nowrap; }
  .brand-name span { font-weight: 600; color: var(--muted); }

  .nav { display: flex; gap: 4px; overflow-x: auto; scrollbar-width: none; }
  .nav::-webkit-scrollbar { display: none; }
  .nav a {
    text-decoration: none; font-weight: 600; font-size: 14px; color: var(--muted);
    padding: 20px 12px 17px; border-bottom: 3px solid transparent; white-space: nowrap;
    transition: color .15s, border-color .15s;
  }
  .nav a:hover { color: var(--ink); }
  .nav a.active { color: var(--ink); border-bottom-color: var(--accent); }
  .nav a .ndot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 6px; vertical-align: 1px; }

  .top-right { margin-left: auto; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .icon-btn { width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--border); background: var(--surface-2); color: var(--ink-2); display: grid; place-items: center; }
  .icon-btn:hover { border-color: var(--border-strong); color: var(--ink); }
  .avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--surface-2); border: 1px solid var(--border); display: grid; place-items: center; font-size: 12.5px; font-weight: 700; color: var(--ink-2); }

  /* search (shared component) */
  .search-wrap { position: relative; }
  .search {
    display: flex; align-items: center; gap: 9px;
    background: var(--surface); border: 1px solid var(--border-strong); border-radius: 12px; padding: 12px 16px;
  }
  .search:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 18%, transparent); }
  .search input { border: 0; background: transparent; color: var(--ink); width: 100%; outline: none; font-size: 14.5px; }
  .search svg { flex-shrink: 0; color: var(--faint); }
  .search kbd { font-size: 10.5px; color: var(--faint); border: 1px solid var(--border-strong); border-radius: 5px; padding: 2px 6px; font-family: inherit; white-space: nowrap; }
  .search-wrap.compact { display: none; }
  .search-wrap.compact .search { padding: 7px 12px; border-radius: 9px; width: 210px; background: var(--surface-2); border-color: var(--border); }
  .search-wrap.compact input { font-size: 13px; }

  .results {
    position: absolute; top: calc(100% + 8px); left: 0; right: 0; min-width: 300px;
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    box-shadow: var(--shadow-lg); padding: 6px; max-height: 62vh; overflow: auto; display: none; z-index: 60;
  }
  .search-wrap.compact .results { left: auto; width: 420px; max-width: 84vw; }
  .results.open { display: block; }
  .res-item { display: block; width: 100%; text-align: left; border: 0; background: transparent; padding: 9px 11px; border-radius: 8px; color: var(--ink); }
  .res-item:hover, .res-item.active { background: var(--surface-2); }
  .res-tag { font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--accent-strong); }
  .res-title { font-weight: 600; font-size: 13.5px; margin: 1px 0; }
  .res-snip { font-size: 12px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .res-empty { padding: 16px; color: var(--muted); font-size: 13px; text-align: center; }

  /* ---------- Page scaffold ---------- */
  .main { padding: 0 24px 96px; }
  .view { max-width: var(--maxw); margin: 0 auto; animation: rise .4s cubic-bezier(.2,.7,.3,1); }
  @keyframes rise { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

  /* ---------- Hero (home) ---------- */
  .hero { display: grid; grid-template-columns: minmax(0,1.5fr) minmax(300px,1fr); gap: 48px; align-items: start; padding: 64px 0 20px; }
  .hero h1 { font-size: clamp(34px, 5vw, 56px); letter-spacing: -.035em; margin: 14px 0 18px; }
  .hero .sub { font-size: 17.5px; color: var(--ink-2); max-width: 46ch; line-height: 1.55; }
  .hero-actions { display: flex; gap: 14px; margin-top: 28px; align-items: stretch; flex-wrap: wrap; }
  .btn-dark {
    display: inline-flex; align-items: center; gap: 10px; border: 0; border-radius: 12px;
    background: var(--ink); color: var(--bg); font-weight: 700; font-size: 15px; padding: 13px 22px;
    transition: transform .15s, box-shadow .15s; text-decoration: none; white-space: nowrap;
  }
  .btn-dark:hover { transform: translateY(-1px); box-shadow: var(--shadow-lg); }
  .hero .search-wrap { flex: 1; min-width: 260px; }

  .qa { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); padding: 22px 22px 10px; }
  .qa h3 { font-size: 17px; margin-bottom: 8px; }
  .qa-item {
    display: flex; align-items: center; gap: 14px; width: 100%; text-align: left;
    background: transparent; border: 0; border-top: 1px solid var(--border); padding: 15px 2px; color: var(--ink);
  }
  .qa-item:first-of-type { border-top: 0; }
  .qa-item:hover .qa-title { color: var(--accent-strong); }
  .qa-ic { width: 38px; height: 38px; border-radius: 10px; display: grid; place-items: center; flex-shrink: 0; }
  .qa-title { font-weight: 650; font-size: 14.5px; transition: color .12s; }
  .qa-sub { font-size: 12px; color: var(--muted); }
  .qa-item .arr { margin-left: auto; color: var(--faint); }

  /* ---------- Brand cards ---------- */
  .brandcards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 36px; }
  .bcard {
    position: relative; background: var(--surface); border: 1px solid var(--border);
    border-top: 4px solid var(--bc, var(--accent));
    border-radius: var(--radius); box-shadow: var(--shadow); padding: 26px 24px 20px;
    display: flex; flex-direction: column; gap: 0; transition: transform .18s, box-shadow .18s;
  }
  .bcard:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); }
  .bcard-head { display: flex; gap: 16px; align-items: flex-start; }
  .bcard h3 { font-size: 22px; letter-spacing: -.025em; color: var(--bc); }
  .bcard .bdesc { font-size: 14px; color: var(--ink-2); margin-top: 6px; }
  .bcard-chips { display: flex; flex-wrap: wrap; gap: 8px; margin: 18px 0 20px; }
  .bchip {
    border: 1px solid color-mix(in srgb, var(--bc) 45%, var(--border)); background: transparent;
    color: var(--bc); font-weight: 600; font-size: 13px; border-radius: 9px; padding: 6px 13px;
    transition: background .12s;
  }
  .bchip:hover { background: color-mix(in srgb, var(--bc) 9%, transparent); }
  .bcard-go {
    margin-top: auto; border: 0; background: transparent; text-align: left; padding: 14px 0 0;
    border-top: 1px solid var(--border); font-weight: 700; font-size: 14.5px; color: var(--ink);
    display: flex; align-items: center; gap: 8px;
  }
  .bcard-go:hover { color: var(--bc); }

  /* ---------- Shared blocks ---------- */
  .page-head { margin: 48px 0 30px; }
  .page-head h1 { font-size: clamp(26px, 3.6vw, 40px); margin: 8px 0 10px; letter-spacing: -.032em; }
  .lede { font-size: 17px; color: var(--ink-2); max-width: 64ch; line-height: 1.55; }

  .prod-head { display: flex; gap: 20px; align-items: center; margin: 48px 0 6px; }
  .prod-head h1 { font-size: clamp(28px, 4vw, 44px); letter-spacing: -.033em; color: var(--accent); }
  .prod-head .tg { font-size: 12.5px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--accent-strong); }
  .prod-head .en { font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--faint); margin-top: 3px; }

  .tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--border); margin: 22px 0 34px; overflow-x: auto; scrollbar-width: none; }
  .tabs::-webkit-scrollbar { display: none; }
  .tabs a {
    text-decoration: none; font-weight: 650; font-size: 14.5px; color: var(--muted);
    padding: 10px 16px 12px; border-bottom: 3px solid transparent; margin-bottom: -1px; white-space: nowrap;
  }
  .tabs a:hover { color: var(--ink); }
  .tabs a.active { color: var(--accent); border-bottom-color: var(--accent); }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); }
  .pad { padding: 22px 24px; }
  .grid { display: grid; gap: 16px; }
  .g2 { grid-template-columns: repeat(2, 1fr); }
  .g3 { grid-template-columns: repeat(3, 1fr); }
  .stack { display: flex; flex-direction: column; gap: 16px; }
  .section { margin-top: 42px; }
  .section > .sec-title { display: flex; align-items: baseline; gap: 12px; margin-bottom: 16px; }
  .section > .sec-title h2 { font-size: 21px; }
  .section > .sec-title .rule { flex: 1; height: 1px; background: var(--border); }

  .chip { display: inline-flex; align-items: center; gap: 6px; font-size: 12.5px; font-weight: 600; padding: 4px 10px; border-radius: 999px; background: var(--surface-2); border: 1px solid var(--border); color: var(--ink-2); }
  .chip.accent { background: color-mix(in srgb, var(--accent) 11%, var(--surface)); border-color: color-mix(in srgb, var(--accent) 30%, var(--border)); color: var(--accent-strong); }

  .pillar { border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 16px 18px; background: var(--surface); }
  .pillar h4 { font-size: 15px; margin-bottom: 5px; }
  .pillar p { font-size: 13.5px; color: var(--muted); }
  .pillar .pn { font-size: 12px; font-weight: 800; color: var(--accent); font-variant-numeric: tabular-nums; }

  .flow { display: flex; flex-wrap: wrap; gap: 10px; align-items: stretch; }
  .step { flex: 1 1 150px; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px 15px; background: var(--surface); }
  .step .sn { font-size: 11px; font-weight: 800; letter-spacing: .1em; color: var(--accent); text-transform: uppercase; }
  .step h4 { font-size: 14.5px; margin: 4px 0 5px; }
  .step p { font-size: 12.5px; color: var(--muted); }

  .isisnt { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .isbox { border-radius: var(--radius-sm); padding: 18px 20px; border: 1px solid var(--border); }
  .isbox.is { background: color-mix(in srgb, var(--good) 8%, var(--surface)); border-color: color-mix(in srgb, var(--good) 26%, var(--border)); }
  .isbox.isnt { background: color-mix(in srgb, var(--bad) 7%, var(--surface)); border-color: color-mix(in srgb, var(--bad) 24%, var(--border)); }
  .isbox .lbl { font-size: 12px; font-weight: 800; letter-spacing: .08em; text-transform: uppercase; display: flex; align-items: center; gap: 7px; margin-bottom: 8px; }
  .isbox.is .lbl { color: var(--good); } .isbox.isnt .lbl { color: var(--bad); }
  .isbox p { font-size: 13.5px; color: var(--ink-2); }

  .sn-list { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 8px; }
  .sn-list li { display: flex; gap: 9px; font-size: 13.5px; align-items: flex-start; }
  .sn-list .mk { flex-shrink: 0; width: 18px; height: 18px; border-radius: 50%; display: grid; place-items: center; font-size: 11px; font-weight: 900; margin-top: 2px; }
  .say .mk { background: color-mix(in srgb,var(--good) 16%,transparent); color: var(--good); }
  .not .mk { background: color-mix(in srgb,var(--bad) 14%,transparent); color: var(--bad); }
  .not li span { color: var(--ink-2); }

  .matrix { display: grid; gap: 14px; }
  .aud { border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 16px 18px; background: var(--surface); }
  .aud .role { font-weight: 700; font-size: 14px; display: flex; align-items: center; gap: 8px; }
  .aud .role .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
  .aud .lead { font-size: 13.5px; color: var(--accent-strong); font-weight: 600; margin: 6px 0 10px; }
  .aud .cares { display: flex; flex-wrap: wrap; gap: 6px; }

  .script { border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); overflow: hidden; }
  .script-head { display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-bottom: 1px solid var(--border); background: var(--surface-2); }
  .script-head h4 { font-size: 14px; }
  .script-head .copy { margin-left: auto; }
  .copy { display: inline-flex; align-items: center; gap: 6px; border: 1px solid var(--border-strong); background: var(--surface); color: var(--ink-2); border-radius: 7px; padding: 5px 11px; font-size: 12.5px; font-weight: 600; }
  .copy:hover { border-color: var(--accent); color: var(--accent-strong); }
  .copy.done { border-color: var(--good); color: var(--good); }
  .script-body { padding: 14px 16px; font-size: 13.5px; color: var(--ink-2); white-space: pre-wrap; line-height: 1.62; }
  .script-body .ph, .ph { background: color-mix(in srgb, var(--accent) 16%, transparent); color: var(--accent-strong); border-radius: 4px; padding: 0 3px; font-weight: 600; }
  .email-sub { font-size: 12.5px; color: var(--muted); padding: 12px 16px 0; }
  .email-sub b { color: var(--ink); }
  ol.pitch { margin: 0; padding: 14px 16px 14px 34px; display: flex; flex-direction: column; gap: 7px; }
  ol.pitch li { font-size: 13.5px; color: var(--ink-2); }

  .obj { border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; background: var(--surface); }
  .obj + .obj { margin-top: 8px; }
  .obj-q { display: flex; align-items: center; gap: 12px; width: 100%; text-align: left; border: 0; background: transparent; padding: 14px 16px; color: var(--ink); font-weight: 600; font-size: 14px; }
  .obj-q .quote { color: var(--accent); font-size: 18px; font-weight: 800; line-height: 1; flex-shrink: 0; }
  .obj-q .caret { margin-left: auto; color: var(--faint); transition: transform .2s; flex-shrink: 0; }
  .obj.open .obj-q .caret { transform: rotate(180deg); }
  .obj-a { padding: 0 16px 15px 44px; font-size: 13.5px; color: var(--ink-2); display: none; }
  .obj.open .obj-a { display: block; }
  .obj-src { display: inline-block; margin-top: 8px; font-size: 11px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--faint); }

  .seg { display: inline-flex; gap: 3px; padding: 3px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 10px; flex-wrap: wrap; }
  .seg button { border: 0; background: transparent; color: var(--muted); padding: 6px 13px; border-radius: 7px; font-weight: 600; font-size: 13px; white-space: nowrap; }
  .seg button:hover { color: var(--ink); }
  .seg button[aria-pressed="true"] { background: var(--surface); color: var(--ink); box-shadow: 0 1px 3px rgba(0,0,0,.12); }

  .stages { display: flex; flex-direction: column; }
  .stage { display: grid; grid-template-columns: 44px 1fr; gap: 16px; padding: 4px 0; }
  .stage-rail { display: flex; flex-direction: column; align-items: center; }
  .stage-n { width: 34px; height: 34px; border-radius: 50%; display: grid; place-items: center; font-weight: 800; font-size: 14px; background: var(--accent); color: var(--on-accent); flex-shrink: 0; font-variant-numeric: tabular-nums; }
  .stage-line { width: 2px; flex: 1; background: var(--border-strong); margin: 4px 0; min-height: 14px; }
  .stage:last-child .stage-line { display: none; }
  .stage-body { padding-bottom: 22px; }
  .stage-body h4 { font-size: 15px; }
  .stage-body .goal { font-size: 13.5px; color: var(--ink-2); margin: 3px 0 6px; }
  .stage-body .exit { font-size: 12.5px; color: var(--muted); }
  .stage-body .exit b { color: var(--accent-strong); font-weight: 700; }

  .tbl-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: var(--radius-sm); }
  table { border-collapse: collapse; width: 100%; min-width: 520px; }
  th, td { text-align: left; padding: 11px 15px; font-size: 13.5px; border-bottom: 1px solid var(--border); vertical-align: top; }
  th { font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: var(--faint); background: var(--surface-2); font-weight: 700; }
  tr:last-child td { border-bottom: 0; }
  td.day { font-weight: 700; color: var(--accent-strong); white-space: nowrap; }

  .fit { display: grid; grid-template-columns: repeat(3,1fr); gap: 14px; }
  .fit-card { border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 18px; background: var(--surface); }
  .fit-l { width: 40px; height: 40px; border-radius: 10px; display: grid; place-items: center; font-weight: 900; font-size: 20px; background: color-mix(in srgb,var(--accent) 14%,var(--surface)); color: var(--accent-strong); margin-bottom: 10px; }
  .fit-card h4 { font-size: 15px; margin-bottom: 5px; }
  .fit-card p { font-size: 13px; color: var(--muted); }

  .rows { display: flex; flex-direction: column; gap: 9px; }
  .row { display: flex; gap: 11px; align-items: flex-start; font-size: 13.5px; color: var(--ink-2); }
  .row .b { flex-shrink: 0; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); margin-top: 8px; }

  .proof { border-left: 3px solid var(--accent); padding: 4px 0 4px 16px; font-size: 13.5px; color: var(--ink-2); }
  .proof + .proof { margin-top: 14px; }

  .palette { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px,1fr)); gap: 12px; }

function logoImg(id, h){
  h = h || 44;
  if (id === 'clark12')
    return `<img src="${LOGOS.clark12}" alt="ClearK12" style="height:${h}px;width:${h}px;border-radius:50%;object-fit:cover;flex-shrink:0" />`;
  if (id === 'crystal')
    return `<span class="logo-swap" style="display:inline-flex;align-items:center"><img class="lg-light" src="${LOGOS.crystal}" alt="Crystal Instruction" style="height:${h}px" /><img class="lg-dark" src="${LOGOS.crystalWhite}" alt="Crystal Instruction" style="height:${h}px" /></span>`;
  return `<span class="ls-tile"><img src="${LOGOS.lonestar}" alt="LoneStar CR" style="height:${h}px;display:block" /></span>`;
}

/* Crystal line-art gem (decorative fallback) */
function gem(color, size){
  size = size || 44;
  return `<svg width="${size}" height="${Math.round(size*1.25)}" viewBox="0 0 24 30" fill="none" stroke="${color}" stroke-width="1.4" stroke-linejoin="round" aria-hidden="true">
    <path d="M12 1.5 3.5 11 12 28.5 20.5 11 Z"/>
    <path d="M12 1.5 8.2 11 12 28.5 M12 1.5 15.8 11 12 28.5 M3.5 11 H20.5"/>
    <path d="M8.2 11 12 15.5 15.8 11" stroke-width="1.1" opacity=".65"/>
  </svg>`;
}

/* ============================ THEME ============================ */
function currentTheme(){
  const t = store.get('ck-theme', 'auto');
  if (t === 'auto') return matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  return t;
}
function applyTheme(){
  const pref = store.get('ck-theme','auto');
  const root = document.documentElement;
  if (pref === 'auto') root.removeAttribute('data-theme');
  else root.setAttribute('data-theme', pref);
  const dark = currentTheme() === 'dark';
  $('#themeIcon').innerHTML = dark
    ? '<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M5 5l1.5 1.5M17.5 17.5 19 19M19 5l-1.5 1.5M6.5 17.5 5 19"/>'
    : '<path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8Z"/>';
}
$('#themeToggle').addEventListener('click', () => {
  store.set('ck-theme', currentTheme() === 'dark' ? 'light' : 'dark');
  applyTheme();
});
matchMedia('(prefers-color-scheme: dark)').addEventListener('change', applyTheme);

/* ============================ CONTEXT ============================ */
function setContext(id){
  document.documentElement.setAttribute('data-product', id);
  $('#footProd').textContent = PROD_META[id].label + " context";
}

/* ============================ COMPONENTS ============================ */
const _payloads = {};
let _pid = 0;
function payload(text){ const id = 'cp'+(_pid++); _payloads[id] = text; return id; }
function copyBtn(label, payloadId){
  return `<button class="copy" data-copy="${payloadId}">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/></svg>${label}</button>`;
}
function scriptCard(title, bodyHtml, copyText){
  const id = payload(copyText);
  return `<div class="script">
    <div class="script-head"><h4>${title}</h4>${copyBtn('Copy', id)}</div>
    <div class="script-body">${bodyHtml}</div>
  </div>`;
}
function pillars(list){
  return `<div class="grid g3">${list.map((p,i) => `
    <div class="pillar"><div class="pn">${String(i+1).padStart(2,'0')}</div>
    <h4>${esc(p.title)}</h4><p>${esc(p.body)}</p></div>`).join('')}</div>`;
}

let objMix = 'all';
function renderObjFinder(){
  const box = $('#objResults'); if (!box) return;
  let merged = DATA.process.sharedObjections.map(o => ({...o, src:'Shared'}));
  if (objMix === 'all'){
    DATA.products.forEach(p => merged.push(...p.objections.map(o => ({...o, src:PROD_META[p.id].short}))));
  } else if (objMix !== 'shared'){
    merged = [
      ...DATA.process.sharedObjections.map(o => ({...o, src:'Shared'})),
      ...prod(objMix).objections.map(o => ({...o, src:PROD_META[objMix].short}))
    ];
  }
  const q = ($('#objFilter')?.value || '').toLowerCase().trim();
  const list = q ? merged.filter(o => (o.objection+' '+o.response).toLowerCase().includes(q)) : merged;
  box.innerHTML = list.length
    ? objList(list, o => o.src)
    : `<div class="card pad" style="color:var(--muted)">No objection matches “${esc(q)}”. Try fewer words.</div>`;
  bindObjections(box);
}

/* ============================ ROUTER ============================ */
const ROUTES = {
  '#/home':               { prod:'clark12',  nav:'#/home',     view:vHome },
  '#/process':            { prod:'clark12',  nav:'#/process',  view:vProcess },
  '#/brand':              { prod:'clark12',  nav:'#/brand',    view:vBrand },
  '#/crystal':            { prod:'crystal',  nav:'#/crystal',  view:()=>vProduct('crystal') },
  '#/crystal/messaging':  { prod:'crystal',  nav:'#/crystal',  view:()=>vMessaging('crystal') },
  '#/crystal/playbook':   { prod:'crystal',  nav:'#/crystal',  view:()=>vPlaybook('crystal') },
  '#/lonestar':           { prod:'lonestar', nav:'#/lonestar', view:()=>vProduct('lonestar') },
  '#/lonestar/messaging': { prod:'lonestar', nav:'#/lonestar', view:()=>vMessaging('lonestar') },
  '#/lonestar/playbook':  { prod:'lonestar', nav:'#/lonestar', view:()=>vPlaybook('lonestar') }
};
function route(){
  let hash = location.hash || '#/home';
  const r = ROUTES[hash] || ROUTES['#/home'];
  if (!ROUTES[hash]) hash = '#/home';
  setContext(r.prod);
  const app = $('#app');
  app.innerHTML = r.view();
  window.scrollTo(0,0);
  document.querySelectorAll('.nav a').forEach(a =>
    a.classList.toggle('active', a.dataset.nav === r.nav));
  bindObjections(app);
  wireRouteLinks(app);
  if (hash === '#/home'){
    attachSearch($('#heroSearch'), $('#heroResults'));
    $('#exploreBtn')?.addEventListener('click', e => {
      e.preventDefault();
      document.getElementById('brands-row')?.scrollIntoView({behavior:'smooth', block:'start'});
    });
  }
  if (hash === '#/process'){
    renderObjFinder();
    $('#objFilter')?.addEventListener('input', renderObjFinder);
    $('#objMix')?.querySelectorAll('button').forEach(b =>
      b.addEventListener('click', () => {
        objMix = b.dataset.mix;
        $('#objMix').querySelectorAll('button').forEach(x => x.setAttribute('aria-pressed', x===b ? 'true':'false'));
        renderObjFinder();
      }));
  }
}
function wireRouteLinks(scope){
  scope.querySelectorAll('[data-route]').forEach(el =>
    el.addEventListener('click', e => {
      e.preventDefault();
      const target = el.dataset.hash;
      const anchor = el.dataset.anchor;
      if (location.hash === target && anchor){
        document.querySelector(anchor)?.scrollIntoView({behavior:'smooth'});
        return;
      }
      location.hash = target;
      if (anchor) setTimeout(() => document.querySelector(anchor)?.scrollIntoView({behavior:'smooth'}), 60);
    }));
}
window.addEventListener('hashchange', route);

/* ============================ COPY ============================ */
document.addEventListener('click', e => {
  const btn = e.target.closest('[data-copy]');
  if (!btn) return;
  const text = _payloads[btn.dataset.copy] || '';
  const done = () => {
    const orig = btn.innerHTML;
    btn.classList.add('done'); btn.innerHTML = '✓ Copied';
    showToast('Copied to clipboard');
    setTimeout(()=>{ btn.classList.remove('done'); btn.innerHTML = orig; }, 1600);
  };
  if (navigator.clipboard?.writeText){
    navigator.clipboard.writeText(text).then(done).catch(()=>fallbackCopy(text,done));
  } else fallbackCopy(text, done);
});
function fallbackCopy(text, cb){
  const ta = document.createElement('textarea'); ta.value = text; ta.style.position='fixed'; ta.style.opacity='0';
  document.body.appendChild(ta); ta.select();
  try { document.execCommand('copy'); cb(); } catch(e){} finally { ta.remove(); }
}
let toastT;
function showToast(msg){
  const t = $('#toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(toastT); toastT = setTimeout(()=>t.classList.remove('show'), 1600);
}

/* ============================ SEARCH ============================ */
function buildIndex(){
  const idx = [];
  DATA.products.forEach(p => {
    idx.push({ tag:PROD_META[p.id].short+' · Cold call', title:'Cold call script', text:p.scripts.coldCall, hash:`#/${p.id}/playbook` });
    idx.push({ tag:PROD_META[p.id].short+' · Email', title:p.scripts.coldEmail.subject, text:p.scripts.coldEmail.body, hash:`#/${p.id}/playbook` });
    idx.push({ tag:PROD_META[p.id].short+' · Pitch', title:'Pitch outline', text:p.scripts.pitchOutline.join(' '), hash:`#/${p.id}/playbook` });
    idx.push({ tag:PROD_META[p.id].short+' · Hook', title:p.hook, text:p.hook, hash:`#/${p.id}/playbook` });
    p.objections.forEach(o => idx.push({ tag:PROD_META[p.id].short+' · Objection', title:o.objection, text:o.response, hash:`#/${p.id}/playbook` }));
    p.discoveryQuestions.forEach(d => idx.push({ tag:PROD_META[p.id].short+' · Discovery', title:d, text:d, hash:`#/${p.id}/playbook` }));
    p.bestFitSignals.forEach(d => idx.push({ tag:PROD_META[p.id].short+' · Best fit', title:d, text:d, hash:`#/${p.id}` }));
    idx.push({ tag:PROD_META[p.id].short, title:p.positioning, text:p.positioning, hash:`#/${p.id}` });
  });
  DATA.process.sharedObjections.forEach(o => idx.push({ tag:'Shared · Objection', title:o.objection, text:o.response, hash:'#/process' }));
  DATA.process.discoveryShared.forEach(d => idx.push({ tag:'Shared · Discovery', title:d, text:d, hash:'#/process' }));
  return idx;
}
const INDEX = buildIndex();

function attachSearch(input, box){
  if (!input || !box) return;
  let list = [], active = -1;
  const close = () => { box.classList.remove('open'); box.innerHTML=''; list=[]; };
  const go = i => { const r = list[i]; if(!r) return; close(); input.value=''; input.blur(); location.hash = r.hash; };
  input.addEventListener('input', () => {
    const q = input.value.toLowerCase().trim();
    if (!q){ close(); return; }
    list = INDEX.filter(i => (i.title+' '+i.text+' '+i.tag).toLowerCase().includes(q)).slice(0,12);
    active = -1;
    box.innerHTML = list.length
      ? list.map((r,i)=>`<button class="res-item" data-i="${i}" role="option"><div class="res-tag">${esc(r.tag)}</div><div class="res-title">${esc(r.title)}</div><div class="res-snip">${esc(r.text)}</div></button>`).join('')
      : `<div class="res-empty">No matches for “${esc(q)}”</div>`;
    box.classList.add('open');
    box.querySelectorAll('.res-item').forEach(b => b.addEventListener('click', ()=>go(+b.dataset.i)));
  });
  input.addEventListener('keydown', e => {
    if (!list.length) return;
    if (e.key==='ArrowDown'){ e.preventDefault(); active=Math.min(active+1,list.length-1); }
    else if (e.key==='ArrowUp'){ e.preventDefault(); active=Math.max(active-1,0); }
    else if (e.key==='Enter'){ e.preventDefault(); go(active<0?0:active); return; }
    else if (e.key==='Escape'){ close(); return; }
    box.querySelectorAll('.res-item').forEach((b,i)=>b.classList.toggle('active',i===active));
  });
  document.addEventListener('click', e => {
    if (!e.target.closest('.search-wrap')) close();
  });
}
attachSearch($('#topSearch'), $('#topResults'));

document.addEventListener('keydown', e => {
  const isCmdK = (e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k';
  const isSlash = e.key === '/' && !/input|textarea/i.test(document.activeElement.tagName);
  if (isCmdK || isSlash){
    e.preventDefault();
    const hero = $('#heroSearch');
    (hero && hero.offsetParent ? hero : $('#topSearch')).focus();
  }
});

applyTheme();
$('#brandGem').innerHTML = logoImg('clark12', 28);
route();
</script>
